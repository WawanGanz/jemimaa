<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/flowers.png" type="image/x-icon">
    <title>Special Gift from Wawan</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff85a2;
            --secondary: #fbb1bd;
            --bg: #fff0f3;
            --text: #4a4e69;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 133, 162, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(251, 177, 189, 0.2) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        /* Animasi Muncul Per Huruf */
        .greetings {
            font-size: 5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            perspective: 1000px;
        }

        .greetings span {
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            transform-origin: bottom;
        }

        /* Delay animasi tiap huruf agar bergelombang */
        .greetings span:nth-child(1) { animation-delay: 0.1s; }
        .greetings span:nth-child(2) { animation-delay: 0.2s; }
        .greetings span:nth-child(3) { animation-delay: 0.3s; }
        .greetings span:nth-child(4) { animation-delay: 0.4s; }
        .greetings span:nth-child(5) { animation-delay: 0.5s; }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); color: var(--secondary); }
        }

        .description {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: var(--text);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 2s forwards 1s; /* Muncul perlahan setelah 1 detik */
        }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(-5px); }
        }

        /* Styling Tombol */
        .button button {
            background-color: var(--primary);
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.3);
            transition: all 0.3s ease;
            animation: pulse 2s infinite;
        }

        .button button:hover {
            transform: scale(1.1);
            background-color: #ff5c8d;
            box-shadow: 0 15px 25px rgba(255, 133, 162, 0.5);
        }

        .button a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 133, 162, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 133, 162, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 133, 162, 0); }
        }

        /* Hiasan Tambahan: Kelopak bunga melayang (Opsional) */
        .petal {
            position: absolute;
            background-color: var(--secondary);
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            z-index: -1;
            animation: falling 10s linear infinite;
        }

        @keyframes falling {
            0% { transform: translate(0, -10vh) rotate(0deg); }
            100% { transform: translate(100vw, 110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="greetings">
        <span>H</span>
        <span>A</span>
        <span>L</span>
        <span>L</span>
        <span>O</span>
        <span></span>
        <span>M</span>
        <span>I</span>
        <span>M</span>
        <span>A</span>
    </div>

    <div class="description">
        <span>Ada Sesuatu Buat Kamu</span>
    </div>

    <div class="button">
        <button onclick="location.href='flower.html'">
            <a href="flower.html">Klik disini</a>
        </button>
    </div>

    <script>
        function createPetal() {
            const petal = document.createElement('div');
            petal.classList.add('petal');
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 20 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 5 + 5 + 's';
            document.body.appendChild(petal);

            setTimeout(() => {
                petal.remove();
            }, 10000);
        }
        setInterval(createPetal, 500);
    </script>

</body>
</html>
